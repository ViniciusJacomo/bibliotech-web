{% extends 'base.html' %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 p-3">
            <div class="card-header bg-white text-center fw-bold text-primary py-4 border-0">
                <i class="bi bi-box-arrow-in-right me-2" style="font-size: 2rem;"></i>
                <h3 class="mb-0">Acessar Bibliotech</h3>
            </div>
            <div class="card-body p-4">
                <form action="/login" method="POST">
                    <div class="mb-4">
                        <label class="form-label text-muted">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg" required placeholder="seu@email.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Senha</label>
                        <input type="password" name="senha" class="form-control form-control-lg" required placeholder="********">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3">Entrar</button>
                </form>
                <div class="text-center mt-4">
                    <a href="{{ url_for('cadastro') }}" class="text-decoration-none">Ainda não tem cadastro? <b>Crie uma conta.</b></a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
