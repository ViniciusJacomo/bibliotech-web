{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white text-center fw-bold text-primary py-3">
                <i class="bi bi-person-plus-fill me-2"></i>Cadastrar Livraria
            </div>
            <div class="card-body p-4">
                <form action="/cadastro" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted">Nome da Livraria</label>
                        <input type="text" name="nome_livraria" class="form-control" required placeholder="Ex: Biblioteca Central">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Email de Acesso</label>
                        <input type="email" name="email" class="form-control" required placeholder="seu@email.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Senha</label>
                        <input type="password" name="senha" class="form-control" required placeholder="Crie uma senha forte">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Cadastrar</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('login') }}" class="small text-decoration-none">Já possui conta? Faça login.</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
